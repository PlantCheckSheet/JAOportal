<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.O Groundworks Ltd | Document Portal</title>

<link rel="apple-touch-icon" sizes="180x180" href="jao-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="jao-icon-192.png">
<meta name="theme-color" content="#0f172a">

<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif;}

body{
  margin:0;
  min-height:100vh;
  background:
    linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.86)),
    url("excavator.jpg");
  background-size:cover;
  background-position:center;
  color:#fff;
}

.app-header{
  background:linear-gradient(135deg,#f4b400,#e0a400);
  color:#111;
  padding:20px 16px 28px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  text-align:center;
}

.header-badge{
  display:inline-block;
  margin-bottom:10px;
  background:rgba(255,255,255,0.25);
  padding:6px 14px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
}

.app-header h1{
  margin:6px 0;
  font-size:26px;
  font-weight:800;
}

.logo-section{
  text-align:center;
  margin-top:-18px;
}

.logo-section img{
  max-width:420px;
  max-height:160px;
  width:82%;
  height:auto;
  filter:
    drop-shadow(0 0 4px rgba(255,255,255,0.95))
    drop-shadow(0 0 10px rgba(255,255,255,0.75))
    drop-shadow(0 8px 16px rgba(0,0,0,0.45));
}

main{
  max-width:700px;
  margin:12px auto 0;
  padding:0 16px 28px;
}

.card{
  background:rgba(255,255,255,0.96);
  color:#1f2933;
  border-radius:18px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:0 14px 34px rgba(0,0,0,0.18);
}

.card h2{
  margin:0 0 8px;
}

.card p{
  color:#64748b;
  font-weight:600;
}

.document-link{
  display:block;
  padding:15px;
  margin-top:10px;
  background:linear-gradient(135deg,#f4b400,#e0a400);
  color:#111;
  text-decoration:none;
  border-radius:12px;
  font-weight:800;
  text-align:center;
}

.back-link{
  display:block;
  text-align:center;
  margin-top:16px;
  color:#fff;
  font-weight:bold;
  text-decoration:none;
}

.warning{
  background:#fff3cd;
  color:#856404;
}

footer{
  text-align:center;
  padding:18px;
  color:rgba(255,255,255,0.75);
  font-size:12px;
}
</style>
</head>

<body>

<div class="app-header">
  <div class="header-badge">DOCUMENT PORTAL</div>
  <h1>J.A.O Groundworks</h1>
</div>

<div class="logo-section">
  <img src="logo.png" alt="J.A.O Groundworks Ltd Logo">
</div>

<main>
  <div class="card" id="content">
    <h2>Loading documents...</h2>
  </div>

  <a class="back-link" href="index.html">← Back to Portal</a>
</main>

<footer>
  © 2026 J.A.O Groundworks Ltd
</footer>

<script>
const signedInSite = localStorage.getItem("jaoSignedInSite");

const documentsBySite = {
  work: [
    {
      name: "Work - Risk Assessment",
      url: "https://drive.google.com/your-work-risk-assessment-link"
    },
    {
      name: "Work - Method Statement",
      url: "https://drive.google.com/your-work-method-statement-link"
    }
  ],

  tesco: [
    {
      name: "Tesco - Risk Assessment",
      url: "https://drive.google.com/your-tesco-risk-assessment-link"
    },
    {
      name: "Tesco - Method Statement",
      url: "https://drive.google.com/your-tesco-method-statement-link"
    }
  ],

  home: [
    {
      name: "Home - Risk Assessment",
      url: "https://drive.google.com/your-home-risk-assessment-link"
    },
    {
      name: "Home - Method Statement",
      url: "https://drive.google.com/your-home-method-statement-link"
    }
  ]
};

function normaliseSiteName(site){
  return String(site || "").trim().toLowerCase();
}

const content = document.getElementById("content");

if(!signedInSite){
  content.classList.add("warning");
  content.innerHTML = `
    <h2>Please sign in first</h2>
    <p>You must be signed into a site before viewing site documents.</p>
    <a class="document-link" href="https://plantchecksheet.github.io/SignInSignOut/">
      Go to Sign In
    </a>
  `;
}else{
  const siteKey = normaliseSiteName(signedInSite);
  const documents = documentsBySite[siteKey];

  if(!documents || documents.length === 0){
    content.innerHTML = `
      <h2>No documents found</h2>
      <p>You are signed into: <strong>${signedInSite}</strong></p>
      <p>No documents have been uploaded for this site yet.</p>
    `;
  }else{
    content.innerHTML = `
      <h2>Documents for ${signedInSite}</h2>
      <p>Only documents for your current signed-in site are shown below.</p>
      ${documents.map(doc => `
        <a class="document-link" href="${doc.url}" target="_blank" rel="noopener">
          📄 ${doc.name}
        </a>
      `).join("")}
    `;
  }
}
</script>

</body>
</html>
