<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.O Groundworks Ltd | Document Portal</title>

<link rel="apple-touch-icon" sizes="180x180" href="jao-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="jao-icon-192.png">
<meta name="theme-color" content="#0f172a">

<style>
*{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif;}

body{
  margin:0;
  min-height:100vh;
  background:
    linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.86)),
    url("excavator.jpg");
  background-size:cover;
  background-position:center;
  color:#fff;
}

.app-header{
  background:linear-gradient(135deg,#f4b400,#e0a400);
  color:#111;
  padding:20px 16px 28px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  text-align:center;
}

.header-badge{
  display:inline-block;
  margin-bottom:10px;
  background:rgba(255,255,255,0.25);
  padding:6px 14px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
}

.app-header h1{
  margin:6px 0;
  font-size:26px;
  font-weight:800;
}

.logo-section{
  text-align:center;
  margin-top:-18px;
}

.logo-section img{
  max-width:420px;
  max-height:160px;
  width:82%;
  height:auto;
  filter:
    drop-shadow(0 0 4px rgba(255,255,255,0.95))
    drop-shadow(0 0 10px rgba(255,255,255,0.75))
    drop-shadow(0 8px 16px rgba(0,0,0,0.45));
}

main{
  max-width:700px;
  margin:12px auto 0;
  padding:0 16px 28px;
}

.card{
  background:rgba(255,255,255,0.96);
  color:#1f2933;
  border-radius:18px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:0 14px 34px rgba(0,0,0,0.18);
}

.card h2{
  margin:0 0 8px;
}

.card p{
  color:#64748b;
  font-weight:600;
}

.document-link{
  display:block;
  padding:15px;
  margin-top:10px;
  background:linear-gradient(135deg,#f4b400,#e0a400);
  color:#111;
  text-decoration:none;
  border-radius:12px;
  font-weight:800;
  text-align:center;
}

.doc-meta{
  display:block;
  font-size:12px;
  font-weight:600;
  margin-top:4px;
  opacity:0.75;
}

.back-link{
  display:block;
  text-align:center;
  margin-top:16px;
  color:#fff;
  font-weight:bold;
  text-decoration:none;
}

.warning{
  background:#fff3cd;
  color:#856404;
}

.error{
  background:#fde2e2;
  color:#7f1d1d;
}

footer{
  text-align:center;
  padding:18px;
  color:rgba(255,255,255,0.75);
  font-size:12px;
}
</style>
</head>

<body>

<div class="app-header">
  <div class="header-badge">DOCUMENT PORTAL</div>
  <h1>J.A.O Groundworks</h1>
</div>

<div class="logo-section">
  <img src="logo.png" alt="J.A.O Groundworks Ltd Logo">
</div>

<main>
  <div class="card" id="content">
    <h2>Loading documents...</h2>
    <p>Please wait while we check your site documents.</p>
  </div>

  <a class="back-link" href="index.html">← Back to Portal</a>
</main>

<footer>
  © 2026 J.A.O Groundworks Ltd
</footer>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxH1p_PiBFm45VSpBC83nSPDkSVjuJFg_YIIMchO5u2ivyn7ibNZuA52weq8p4mqyX1VA/exec";

const signedInSite = localStorage.getItem("jaoSignedInSite");
const content = document.getElementById("content");

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadDocuments(){
  if(!signedInSite){
    content.classList.add("warning");
    content.innerHTML = `
      <h2>Please sign in first</h2>
      <p>You must be signed into a site before viewing site documents.</p>
      <a class="document-link" href="https://plantchecksheet.github.io/SignInSignOut/">
        Go to Sign In
      </a>
    `;
    return;
  }

  try{
    const response = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "getRAMSDocuments",
        site: signedInSite
      })
    });

    const result = await response.json();

    if(!result.success){
      throw new Error(result.message || "Unable to load documents");
    }

    const documents = Array.isArray(result.documents) ? result.documents : [];

    if(documents.length === 0){
      content.innerHTML = `
        <h2>No documents found</h2>
        <p>You are signed into: <strong>${escapeHtml(signedInSite)}</strong></p>
        <p>No documents have been uploaded for this site yet.</p>
      `;
      return;
    }

    content.innerHTML = `
      <h2>Documents for ${escapeHtml(signedInSite)}</h2>
      <p>Only documents for your current signed-in site are shown below.</p>
      ${documents.map(doc => `
        <a class="document-link" href="${escapeHtml(doc.url)}" target="_blank" rel="noopener">
          📄 ${escapeHtml(doc.name)}
          ${doc.lastUpdated ? `<span class="doc-meta">Last updated: ${escapeHtml(doc.lastUpdated)}</span>` : ""}
        </a>
      `).join("")}
    `;

  }catch(error){
    content.classList.add("error");
    content.innerHTML = `
      <h2>Unable to load documents</h2>
      <p>${escapeHtml(error.message)}</p>
      <p>Please check the Apps Script web app URL and deployment permissions.</p>
    `;
  }
}

loadDocuments();
</script>

</body>
</html>
